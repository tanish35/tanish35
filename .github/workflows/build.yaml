name: Update profile stats

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - name: Update stats
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN || github.token }}
          USER_NAME: tanish35
        run: python today.py
      - name: Commit changes
        run: |
          git config user.name "tanish35/GitHub-Actions-Bot"
          git config user.email "142332924+tanish35@users.noreply.github.com"
          git add dark_mode.svg
          git diff --cached --quiet || git commit -m "Update profile stats"
          git push
